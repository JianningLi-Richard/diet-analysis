name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install pandas matplotlib seaborn pylint azure-storage-blob

      - name: Run pylint
        run: pylint data_analysis.py lambda_function.py --exit-zero

      - name: Build Docker image
        run: docker build -t diet-analysis:latest .
    
      - name: Build multistage image and compare sizes
        run: |
          docker build -t diet-analysis:multistage -f Dockerfile.multistage .
          echo "=== IMAGE SIZE COMPARISON ==="
          docker images | grep diet-analysis

      - name: Run container (simulated deployment)
        run: docker run --rm diet-analysis:latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repo owner
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Push image to GHCR
        run: |
          docker tag diet-analysis:latest ghcr.io/${{ env.OWNER_LC }}/diet-analysis:latest
          docker push ghcr.io/${{ env.OWNER_LC }}/diet-analysis:latest