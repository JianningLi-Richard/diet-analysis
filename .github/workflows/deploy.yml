name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install pandas matplotlib seaborn pylint azure-storage-blob

      - name: Run pylint
        run: pylint data_analysis.py lambda_function.py --exit-zero

      - name: Build Docker image
        run: docker build -t diet-analysis:latest .

      - name: Run container (simulated deployment)
        run: docker run --rm diet-analysis:latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        run: |
          docker tag diet-analysis:latest ghcr.io/${{ github.repository_owner }}/diet-analysis:latest
          docker push ghcr.io/${{ github.repository_owner }}/diet-analysis:latest
